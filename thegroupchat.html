<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Group Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #446742;
    --bg-deep: #395a37;
    --text: #EAE8C9;
    --text-dim: #c9c9a8;
    --line: rgba(234,232,201,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x:hidden;
    position:relative;
  }

  /* faint vignette + grain-like texture */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(ellipse at 50% 30%, rgba(234,232,201,0.06), transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(0,0,0,0.15), transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  .wrap{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 8vh 6vw;
  }

  h1{
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.4rem, 6vw, 5rem);
    line-height:0.95;
    font-weight:400;
    letter-spacing:-0.01em;
    opacity:0;
    animation: fadeUp 1.1s ease forwards 0.3s;
  }
  .sub{
    margin-top:1.3rem;
    max-width:30rem;
    font-size: clamp(0.9rem, 1.1vw, 1rem);
    font-style:normal;
    line-height:1.5;
    color: var(--text-dim);
    opacity:0;
    animation: fadeUp 1.1s ease forwards 0.55s;
  }

  /* Countdown — the signature element: doors, not digits alone */
  .countdown{
    margin-top: 2.6rem;
    display:flex;
    gap: clamp(1rem, 3vw, 2.2rem);
    opacity:0;
    animation: fadeUp 1.1s ease forwards 0.8s;
  }
  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .unit .num{
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height:1;
    font-variant-numeric: tabular-nums;
    border-bottom: 1px solid var(--line);
    padding-bottom: 0.4rem;
    min-width: 2ch;
  }
  .unit .label{
    margin-top:0.5rem;
    font-style:normal;
    font-size: clamp(0.7rem, 0.9vw, 0.8rem);
    letter-spacing:0.12em;
    text-transform:uppercase;
    color: var(--text-dim);
  }
  .countdown-label{
    margin-top:1rem;
    font-style:normal;
    font-size: clamp(0.8rem, 1vw, 0.9rem);
    color: var(--text-dim);
    opacity:0;
    animation: fadeUp 1.1s ease forwards 0.9s;
  }

  .cta{
    margin-top: 2.4rem;
    opacity:0;
    animation: fadeUp 1.1s ease forwards 1.05s;
  }
  .btn{
    display:inline-block;
    font-family:'Inter', sans-serif;
    font-style:normal;
    font-weight:500;
    font-size: clamp(0.9rem, 1.1vw, 1rem);
    color: var(--bg);
    background: var(--text);
    border: 1px solid var(--text);
    padding: 0.7rem 1.8rem;
    border-radius: 999px;
    text-decoration:none;
    cursor:pointer;
    transition: transform 0.35s ease, background 0.35s ease, color 0.35s ease;
  }
  .btn:hover{
    background: transparent;
    color: var(--text);
    transform: translateY(-2px);
  }
  .btn:focus-visible{
    outline: 2px solid var(--text);
    outline-offset: 4px;
  }
  .cta small{
    display:block;
    margin-top:0.9rem;
    font-style:italic;
    color: var(--text-dim);
    font-size:0.95rem;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-delay:0s !important;}
  }

  @media (max-width: 520px){
    .countdown{ gap: 1rem; }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>The Group Chat</h1>
  <p class="sub">Are you looking to advance yourself and life and make your dreams come true but don&rsquo;t know where to start? Well we have the answer.</p>

  <div class="countdown" id="countdown" aria-live="polite">
    <div class="unit"><span class="num" id="days">20</span><span class="label">Days</span></div>
    <div class="unit"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
    <div class="unit"><span class="num" id="minutes">00</span><span class="label">Minutes</span></div>
    <div class="unit"><span class="num" id="seconds">00</span><span class="label">Seconds</span></div>
  </div>
  <p class="countdown-label">until class is officially in session</p>

  <div class="cta">
    <a href="https://discord.gg/YOUR-INVITE-CODE" class="btn" id="joinBtn">Join for free</a>
  </div>
</div>


<script>
  // Countdown target: 20 days from page load, set once so it doesn't reset on refresh mid-day
  const STORAGE_KEY = 'tgc_deadline';
  let deadline = localStorage.getItem(STORAGE_KEY);
  if(!deadline){
    deadline = Date.now() + 20 * 24 * 60 * 60 * 1000;
    localStorage.setItem(STORAGE_KEY, deadline);
  } else {
    deadline = parseInt(deadline, 10);
  }

  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');

  function pad(n){ return n.toString().padStart(2,'0'); }

  function tick(){
    const now = Date.now();
    let diff = deadline - now;
    if(diff <= 0){
      daysEl.textContent = '00';
      hoursEl.textContent = '00';
      minutesEl.textContent = '00';
      secondsEl.textContent = '00';
      return;
    }
    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
    const s = Math.floor((diff % (1000*60)) / 1000);
    daysEl.textContent = pad(d);
    hoursEl.textContent = pad(h);
    minutesEl.textContent = pad(m);
    secondsEl.textContent = pad(s);
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
